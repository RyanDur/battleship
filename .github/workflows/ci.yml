name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle tests
        run: ./gradlew test

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Frontend lint
        working-directory: applications/web-client
        run: npm run lint

      - name: Frontend tests
        working-directory: applications/web-client
        run: npm test

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v5

      - name: Gradle tests
        run: ./gradlew test

      - name: Build boot jar
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ./gradlew :applications:signaling-server:bootJar -Pversion=${GITHUB_REF_NAME#v}
          else
            ./gradlew :applications:signaling-server:bootJar
          fi

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Frontend lint
        working-directory: applications/web-client
        run: npm run lint

      - name: Frontend tests
        working-directory: applications/web-client
        run: npm test

      - name: Build frontend dist
        working-directory: applications/web-client
        run: npm run build

      - name: Upload boot jar
        uses: actions/upload-artifact@v7
        with:
          name: boot-jar
          path: applications/signaling-server/build/libs/
          if-no-files-found: error

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: applications/web-client/dist/
          if-no-files-found: error

  e2e:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: actions/download-artifact@v8
        with:
          name: boot-jar
          path: applications/signaling-server/build/libs

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: applications/web-client/dist

      - name: Write e2e config
        run: echo '{"version":"dev","serviceUrl":"http://localhost:8081"}' > applications/web-client/dist/config.json

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: applications/web-client
        run: npm run playwright:install

      - name: Run e2e tests
        working-directory: applications/web-client
        run: npm run e2e:run

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: applications/web-client/playwright-report/

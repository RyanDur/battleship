name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle tests
        run: ./gradlew test

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Frontend lint
        working-directory: applications/web-client
        run: npm run lint

      - name: Frontend tests
        working-directory: applications/web-client
        run: npm test

  e2e:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Build backend jar
        run: ./gradlew :applications:signaling-server:bootJar

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: applications/web-client
        run: npm run playwright:install

      - name: Run e2e tests
        working-directory: applications/web-client
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: applications/web-client/playwright-report/

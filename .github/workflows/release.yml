name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: "*.dmg"
            type: dmg
          - os: windows-latest
            artifact: "*.msi"
            type: msi
          - os: ubuntu-latest
            artifact: "*.deb"
            type: deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/download-artifact@v8
        with:
          name: boot-jar
          path: boot-jar
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Build installer
        shell: bash
        run: |
          JAR=$(ls boot-jar/*.jar | grep -v "\-plain\.jar")
          JAR_DIR=$(dirname "$JAR")
          JAR_NAME=$(basename "$JAR")

          VERSION=${TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          if [ "$MAJOR" -lt 1 ]; then MAJOR=1; fi
          MINOR_PATCH=$(echo "$VERSION" | cut -d. -f2-)
          APP_VERSION="$MAJOR.$MINOR_PATCH"

          mkdir -p build/jpackage
          jpackage \
            --input "$JAR_DIR" \
            --main-jar "$JAR_NAME" \
            --main-class org.springframework.boot.loader.launch.JarLauncher \
            --name Battleship \
            --app-version "$APP_VERSION" \
            --type ${{ matrix.type }} \
            --dest build/jpackage \
            --java-options "-Xmx256m"
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.os }}
          path: build/jpackage/${{ matrix.artifact }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Write production config
        run: |
          VERSION=${TAG#v}
          echo "{\"version\":\"$VERSION\",\"serviceUrl\":\"http://localhost:8080\"}" > config.json
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: "*"
          generate_release_notes: true

name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: "*.dmg"
          - os: windows-latest
            artifact: "*.msi"
          - os: ubuntu-latest
            artifact: "*.deb"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: |
          VERSION=${TAG#v}
          ./gradlew :applications:signaling-server:jpackage -Pversion=$VERSION
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: applications/signaling-server/build/jpackage/${{ matrix.artifact }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - name: Install dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Build
        working-directory: applications/web-client
        run: |
          export VITE_APP_VERSION=${TAG#v}
          npm run build
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: applications/web-client/dist

      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: "*"
          generate_release_notes: true

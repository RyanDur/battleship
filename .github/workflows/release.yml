name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle tests
        run: ./gradlew test

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Frontend lint
        working-directory: applications/web-client
        run: npm run lint

      - name: Frontend tests
        working-directory: applications/web-client
        run: npm test

  e2e:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Build backend jar
        run: ./gradlew :applications:signaling-server:bootJar

      - name: Install frontend dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: applications/web-client
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: applications/web-client
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: applications/web-client/playwright-report/

  build:
    needs: e2e
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: "*.dmg"
          - os: windows-latest
            artifact: "*.msi"
          - os: ubuntu-latest
            artifact: "*.deb"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: ./gradlew :applications:signaling-server:jpackage

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: applications/signaling-server/build/jpackage/${{ matrix.artifact }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: applications/web-client/package-lock.json

      - name: Install dependencies
        working-directory: applications/web-client
        run: npm ci

      - name: Build
        working-directory: applications/web-client
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: applications/web-client/dist

      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*"
          generate_release_notes: true
